<!DOCTYPE html>
<html>
<head>
    <title>HMS Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<h2>HMS Admin Dashboard</h2>

<div class="tabs">
    <button id="doctorTab">Manage Doctors</button>
    <button id="reportTab">Manage Patient Reports</button>
</div>

<!-- DOCTOR SECTION -->
<div id="doctorSection" class="section">

    <h3>Add / Update Doctor</h3>
    <form id="doctorForm">
        <input type="hidden" id="doctorId">
        <input type="text" id="doctorName" placeholder="Doctor Name" required>
        <input type="text" id="specialization" placeholder="Specialization" required>
        <button type="submit">Save Doctor</button>
    </form>

    <table id="doctorTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Specialization</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- REPORT SECTION -->
<div id="reportSection" class="section" style="display:none;">

    <h3>Add / Update Patient Report</h3>
    <form id="reportForm">
        <input type="hidden" id="reportId">
        <input type="text" id="patientName" placeholder="Patient Name" required>
        <input type="text" id="diagnosis" placeholder="Diagnosis" required>

        <select id="assignedDoctor" required>
            <option value="">Select Doctor</option>
        </select>

        <button type="submit">Save Report</button>
    </form>

    <table id="reportTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Patient</th>
                <th>Diagnosis</th>
                <th>Doctor</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="app.js"></script>
</body>
</html>
