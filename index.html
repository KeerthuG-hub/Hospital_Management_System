<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration - MEDIU Hospital</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>MEDIU Hospital</h1>
  <p class="sub">Patient Registration Form</p>
  <hr>

  <form id="regForm" onsubmit="return validate()">

    <h2>Personal Information</h2>

    <div class="row">
      <div class="form-group">
        <label class="required">First Name</label>
        <input type="text" id="firstName">
        <div class="error" id="e-firstName"></div>
      </div>
      <div class="form-group">
        <label class="required">Last Name</label>
        <input type="text" id="lastName">
        <div class="error" id="e-lastName"></div>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label class="required">Date of Birth</label>
        <input type="date" id="dob">
        <div class="error" id="e-dob"></div>
      </div>
      <div class="form-group">
        <label class="required">Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="male"> Male</label>
          <label><input type="radio" name="gender" value="female"> Female</label>
          <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
        <div class="error" id="e-gender"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="required">Aadhar Number</label>
      <input type="text" id="aadhar" maxlength="14" placeholder="XXXX-XXXX-XXXX">
      <div class="error" id="e-aadhar"></div>
    </div>

    <h2>Login Details</h2>

    <div class="row">
      <div class="form-group">
        <label class="required">Password</label>
        <input type="password" id="password">
        <div class="error" id="e-password"></div>
      </div>
      <div class="form-group">
        <label class="required">Confirm Password</label>
        <input type="password" id="confirmPwd">
        <div class="error" id="e-confirmPwd"></div>
      </div>
    </div>

    <h2>Contact Information</h2>

    <div class="row">
      <div class="form-group">
        <label class="required">Email</label>
        <input type="text" id="email">
        <div class="error" id="e-email"></div>
      </div>
      <div class="form-group">
        <label class="required">Phone</label>
        <input type="text" id="phone" maxlength="10">
        <div class="error" id="e-phone"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="required">Address</label>
      <input type="text" id="address">
      <div class="error" id="e-address"></div>
    </div>

    <div class="row">
      <div class="form-group">
        <label class="required">City</label>
        <input type="text" id="city">
        <div class="error" id="e-city"></div>
      </div>
      <div class="form-group">
        <label class="required">State</label>
        <input type="text" id="state">
        <div class="error" id="e-state"></div>
      </div>
      <div class="form-group">
        <label class="required">ZIP Code</label>
        <input type="text" id="zip" maxlength="6">
        <div class="error" id="e-zip"></div>
      </div>
    </div>

    <h2>Consent</h2>

    <div class="form-group">
      <label style="display:flex; align-items:center; gap:8px; font-weight:normal; cursor:pointer;">
        <input type="checkbox" id="consent1" style="width:auto;"> I authorize treatment
      </label>
      <div class="error" id="e-consent1"></div>
    </div>

    <div class="form-group">
      <label style="display:flex; align-items:center; gap:8px; font-weight:normal; cursor:pointer;">
        <input type="checkbox" id="consent2" style="width:auto;"> I agree to privacy policy
      </label>
      <div class="error" id="e-consent2"></div>
    </div>

    <div class="actions">
      <button type="reset" class="btn-reset">Reset</button>
      <button type="submit" class="btn-primary">Register Patient</button>
    </div>

  </form>

  <div class="success" id="successBox">
    <h3>Registration Successful!</h3>
    <p id="successText"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
